<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#8b0018">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles.css">
  <title>Küchen-Dashboard</title>
</head>
<body>
  <main class="dash-shell">
    <header class="dash-header">
      <img src="/assets/liverpool-logo.png" onerror="this.style.display='none'" alt="Liverpool FC">
      <div><h1>Küchen-Dashboard</h1><p>Live Bestellungen</p></div>
      <button id="enableSound" class="sound-btn">🔔 Ton</button>
      <div class="total-box"><small>Gesamt</small><strong id="totalItemCount">0</strong><span>Artikel</span></div>
    </header>
    <nav class="dash-tabs"><span class="active">Offene Bestellungen</span><span>Gesamtübersicht</span></nav>
    <section class="dashboard-grid">
      <div class="dash-card">
        <div id="empty" class="empty">Noch keine offenen Bestellungen.</div>
        <div id="orders" class="orders"></div>
      </div>
      <aside class="dash-card counter-card">
        <h2>📊 Gesamtübersicht</h2>
        <div id="counterEmpty" class="empty">Noch keine Artikel bestellt.</div>
        <div id="itemCounter" class="counter-list"></div>
      </aside>
    </section>
    <footer class="ynwa-footer">⚜ You’ll Never Walk Alone ⚜</footer>
  </main>
  <script src="/app.js"></script>
  <script>app.initDashboard()</script>
</body>
</html>
