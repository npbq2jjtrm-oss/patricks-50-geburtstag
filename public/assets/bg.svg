<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="base" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#3a1d52"/>
      <stop offset="45%" stop-color="#1d1438"/>
      <stop offset="100%" stop-color="#0c0a1f"/>
    </radialGradient>
    <radialGradient id="glowGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd76e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffd76e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRose" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6fae" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6fae" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6ea8ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6ea8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <rect width="800" height="1200" fill="url(#base)"/>

  <!-- grosse, weiche Bokeh-Lichter -->
  <circle cx="120" cy="160" r="220" fill="url(#glowGold)"/>
  <circle cx="700" cy="120" r="180" fill="url(#glowRose)"/>
  <circle cx="660" cy="560" r="240" fill="url(#glowBlue)"/>
  <circle cx="90"  cy="640" r="200" fill="url(#glowRose)"/>
  <circle cx="420" cy="980" r="260" fill="url(#glowGold)"/>
  <circle cx="740" cy="1040" r="170" fill="url(#glowRose)"/>

  <!-- kleine funkelnde Bokeh-Punkte -->
  <g filter="url(#soft)" fill="#ffd76e">
    <circle cx="220" cy="300" r="10" opacity="0.7"/>
    <circle cx="540" cy="260" r="7"  opacity="0.6"/>
    <circle cx="360" cy="430" r="6"  opacity="0.5"/>
    <circle cx="620" cy="700" r="9"  opacity="0.6"/>
    <circle cx="180" cy="820" r="7"  opacity="0.6"/>
    <circle cx="470" cy="760" r="5"  opacity="0.5"/>
    <circle cx="300" cy="1050" r="8" opacity="0.6"/>
    <circle cx="680" cy="900" r="6"  opacity="0.5"/>
  </g>
  <g filter="url(#soft)" fill="#fff3c9">
    <circle cx="430" cy="180" r="4" opacity="0.8"/>
    <circle cx="150" cy="480" r="3" opacity="0.7"/>
    <circle cx="700" cy="420" r="4" opacity="0.7"/>
    <circle cx="540" cy="980" r="3" opacity="0.7"/>
  </g>
</svg>
