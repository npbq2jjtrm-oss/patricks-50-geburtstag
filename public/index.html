<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#8b0018">
  <title>Patrick's 50th</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="clean-shell">
    <header class="clean-topbar">
      <div class="clean-brand">🎁 <strong data-restaurant>Patrick's 50th</strong></div>
    </header>

    <section class="clean-hero">
      <div class="clean-hero-left">
        <div class="clean-logo-row">
          <img src="/assets/liverpool-logo.png" alt="Liverpool FC" onerror="this.style.display='none'">
          <div>
            <div class="clean-ynwa">YNWA</div>
            <div class="clean-ynwa-sub">YOU’LL NEVER WALK ALONE</div>
          </div>
        </div>
        <p class="clean-kicker">Patrick's 50th Birthday</p>
        <h1 class="clean-title"><span>Happy Birthday</span><em>Patrick!</em></h1>
        <p class="clean-subtitle" data-subtitle></p>
        <div class="clean-actions">
          <a href="/order.html?table=1">🍽️ Bestellseite testen</a>
          <a href="/dashboard.html">📋 Dashboard</a>
          <a href="/qr.html">▦ QR-Codes</a>
        </div>
      </div>
      <div class="clean-hero-right" aria-hidden="true">
        <div class="clean-big50">50</div>
        <div class="clean-badge">You’ll Never Walk Alone</div>
      </div>
    </section>
  </main>
  <script src="/app.js"></script>
  <script>app.getMenu().then(menu => app.applyMenuText(menu))</script>
</body>
</html>
