<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#8b0018">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles.css">
  <title>QR-Codes</title>
</head>
<body>
  <main class="dash-shell">
    <header class="dash-header no-print">
      <img src="/assets/liverpool-logo.png" onerror="this.style.display='none'" alt="Liverpool FC">
      <div><h1>Patrick’s 50th Birthday</h1><p>Scanne den QR-Code deines Tisches</p></div>
    </header>
    <section class="dash-card no-print">
      <div class="qr-controls">
        <input id="origin" placeholder="https://deine-adresse.onrender.com">
        <input id="tables" type="number" min="1" max="99" value="10">
        <button class="primary" id="makeQr">QR-Codes erzeugen</button>
        <button class="primary secondary" id="print">Drucken</button>
      </div>
    </section>
    <div id="qrGrid" class="qr-grid"></div>
    <footer class="ynwa-footer no-print">⚜ You’ll Never Walk Alone ⚜</footer>
  </main>
  <script src="/app.js"></script>
  <script>app.initQr()</script>
</body>
</html>
